<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Laurel Cerrato">
    <meta name="description"
        content="This is the home page, here you will learned the purpose of this site and learn how to use it.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:ital,wght@0,300..700;1,300..700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/techc.css">
    <link rel="stylesheet" href="styles/techcLarge.css">
    <script src="scripts/techc.js" defer></script>
    <title>Suggestions Page</title>
</head>

<body>
    <header>
        <div id="logo-container">
            <img src="images/logo.png" alt="TechChoice Logo">
        </div>
        <button type="button" id="menu"></button>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="suggestions.html">Suggestions</a></li>
                <li><a href="siteplan.html">Site Plan</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>What are you looking for?</h1>
        <div id="main-form">
            
            <form action="result.html" method="get">
                <fieldset id="choose-device">
                    <legend>Choosing your desire Characteristics</legend>
                    <label for="device-type">Type of Device</label>
                <select id="device-type" name="device type" required>
                    <option value="" disabled selected>Select a Type...</option>
                </select>

                </fieldset>
                <fieldset>
                    <legend>Choose preffered storage</legend>
                    <label for="128"><input type="radio" id="128" name="storage" value="1" required> 128 GB</label>
                    <label for="256"> <input type="radio" id="256" name="storage" value="2" required>256 GB</label>
                    <label for="512"> <input type="radio" id="512" name="storage" value="3" required>512 GB</label>
                    <label for="non-a"> <input type="radio" id="non-a" name="storage" value="4" required>Non applicable</label>
                </fieldset>


                <fieldset id="rating">
                    <legend>Select your Budget Range </legend>
                    <label for="price1">
                    <input type="radio" id="price1" name="priceRange" value="all" required>
                    All Prices
                    </label>
                    
                    <label for="price2">
                        <input type="radio" id="price2" name="priceRange" value="budget">
                        Budget ($0 - $300)
                    </label>
                    
                    <label for="price3">
                        <input type="radio" id="price3" name="priceRange" value="mid">
                        Mid Range ($301 - $800)
                    </label>
                    
                    <label for="price4">
                        <input type="radio" id="price4" name="priceRange" value="premium">
                        Premium ($801 - $1500)
                    </label>
                    
                    <label for="price5">
                        <input type="radio" id="price5" name="priceRange" value="high">
                        High-End ($1500+)
                    </label>
                </fieldset>
                <div class="button">
                    <button type="submit">Search For Suggestions</button>
                </div>
            </form>
        </div>
       

    </main>

    <footer>
        <a href="siteplan.html">Site Plan</a>
        <p>&copy<span id="currentyear"></span> Laurel Xiomara Cerrato Ramírez, Honduras, San Pedro Sula</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

</body>

</html>
