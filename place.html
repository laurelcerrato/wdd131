<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This my countru page for WDD131">
    <meta name="author" content="Laurel Cerrato">
    <link rel="stylesheet" href="styles/country-large.css">
    <link rel="stylesheet" href="styles/country.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:ital,wght@0,300..700;1,300..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <script src="scripts/country.js" defer> </script>
    <title>Country Page - Laurel Cerrato WDD131</title>
</head>

<body>
    <header>
        <h1>Honduras</h1>
    </header>
    <main>

        <section id="hero">
            <picture id="hero-img">
                <source srcset="images/honduraslarge.webp" media="(min-width: 1000px)">
                <source srcset="images/hondurasmedium.webp" media="(min-width: 370px)">
                <img src="images/hondurassmall.webp" alt="Honduras View" width="400" height="200">
            </picture>

            <div class="card-data">
                <h2>
                    Data
                </h2>
                <p><b>Area:</b> 112,777 kms</p>
                <p><b>Population:</b> 11.2 millin</p>
                <p><b>Capital:</b> Tegucigalpa</p>
                <p><b>Languages:</b>Spanish</p>
                <p><b>Currency:</b> Lempiras</p>
                <p><b>Time Zone:</b>CST</p>
                <p><b>Calling Code:</b>+504</p>
                <p><b>Internet TLD:</b> .MG</p>

            </div>
            <div class="card-weather">
                <h2 class="weather-heading">Weather</h2>
                <img src="images/weather.svg" alt="Weather Icon" id="weather-icon" width="50" height="50">
                <p id="temp"></p>
                <p id="windspeed"></p>
                <p id="wcfactor"></p>
                <p><b>Conditions:</b> Partly Cloudy</p>




            </div>
        </section>

    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span>🌺Laurel Xiomara Cerrato Ramírez, Honduras, San Pedro Sula🌺</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
